<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2744"/>
      <stop offset="100%" style="stop-color:#1a4070"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#F0D98A"/>
    </linearGradient>
    <clipPath id="globe-clip">
      <circle cx="980" cy="315" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gold accent bar top -->
  <rect width="1200" height="4" fill="url(#gold)"/>

  <!-- Globe decoration (right side) -->
  <g clip-path="url(#globe-clip)" opacity="0.12" stroke="#C9A84C" stroke-width="1.5" fill="none">
    <circle cx="980" cy="315" r="200"/>
    <ellipse cx="980" cy="315" rx="200" ry="60"/>
    <ellipse cx="980" cy="315" rx="200" ry="120"/>
    <ellipse cx="980" cy="195" rx="172" ry="50"/>
    <ellipse cx="980" cy="435" rx="172" ry="50"/>
    <line x1="980" y1="115" x2="980" y2="515"/>
    <path d="M980,115 C900,175 900,455 980,515"/>
    <path d="M980,115 C1060,175 1060,455 980,515"/>
  </g>
  <circle cx="980" cy="315" r="200" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Nodes on globe -->
  <circle cx="980" cy="115" r="8" fill="#C9A84C" opacity="0.6"/>
  <circle cx="1145" cy="210" r="8" fill="#C9A84C" opacity="0.6"/>
  <circle cx="1145" cy="420" r="8" fill="#C9A84C" opacity="0.6"/>
  <line x1="980" y1="115" x2="1145" y2="210" stroke="#C9A84C" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="980" y1="115" x2="1145" y2="420" stroke="#C9A84C" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- Logo wordmark -->
  <text x="80" y="120" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="rgba(255,255,255,0.9)">Nanuri</text>
  <text x="218" y="120" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#C9A84C">Web</text>
  <text x="80" y="148" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" letter-spacing="1">Korean · English · Español 홈페이지 전문</text>

  <!-- Divider -->
  <rect x="80" y="175" width="60" height="3" fill="url(#gold)" rx="2"/>

  <!-- Main headline -->
  <text x="80" y="265" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="white">Get Found.</text>
  <text x="80" y="345" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="white">Get Customers.</text>

  <!-- Sub headline -->
  <text x="80" y="400" font-family="Inter, Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.75)">Professional Websites</text>
  <text x="80" y="432" font-family="Inter, Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.75)">for Businesses &amp; Churches</text>

  <!-- Price badge -->
  <rect x="80" y="470" width="200" height="52" rx="10" fill="#C9A84C"/>
  <text x="180" y="503" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0B1628" text-anchor="middle">From $299</text>

  <!-- Language chips -->
  <rect x="300" y="470" width="90" height="52" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="345" y="503" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">한국어</text>

  <rect x="404" y="470" width="90" height="52" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="449" y="503" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">English</text>

  <rect x="508" y="470" width="90" height="52" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="553" y="503" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Español</text>

  <!-- Domain -->
  <a href="https://nanuriweb.com" target="_blank">
    <text x="80" y="590" font-family="Inter, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.65)" text-decoration="underline" cursor="pointer">nanuriweb.com</text>
  </a>

  <!-- HebronGuide badge -->
  <a href="https://hebronguide.com" target="_blank">
    <rect x="900" y="540" width="220" height="52" rx="10" fill="rgba(26,127,90,0.3)" stroke="#1A7F5A" stroke-width="1" cursor="pointer"/>
    <text x="1010" y="572" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle" cursor="pointer">🌐 HebronGuide 72+ Cities</text>
  </a>
</svg>
